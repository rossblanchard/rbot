<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="forestGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2f1f"/>
      <stop offset="100%" stop-color="#1e4d2b"/>
    </linearGradient>
    <linearGradient id="silverAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9d9d9"/>
      <stop offset="100%" stop-color="#9a9a9a"/>
    </linearGradient>
  </defs>

  <!-- Background circle (dark PNW forest tone) -->
  <circle cx="256" cy="256" r="240" fill="url(#forestGradient)" />

  <!-- Subtle mountain silhouette nod to PNW -->
  <path d="M120 320 L200 220 L240 270 L290 190 L392 320 Z"
        fill="#0b1f14" opacity="0.35" />

  <!-- Stylized rB lettering -->
  <text x="50%" y="54%"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="220"
        font-weight="700"
        fill="url(#silverAccent)">
    rB
  </text>

  <!-- Subtle tech ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2f7a45" stroke-width="8" opacity="0.6" />
</svg>
